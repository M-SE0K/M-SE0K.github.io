<script>
(function(){
  const isDesktop = () => window.innerWidth >= 992;
  const getSections = () => Array.from(document.querySelectorAll('.home-section'));
  let sections = getSections();
  if (!sections.length) return;

  let animating = false;
  let currentIndex = 0;

  const clamp = (n, min, max) => Math.max(min, Math.min(n, max));

  const isEditable = (el) => {
    const tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || el.isContentEditable;
  };

  const isInScrollable = (el) => {
    let node = el;
    while (node && node !== document.body) {
      const style = window.getComputedStyle(node);
      const canScrollY = /(auto|scroll)/.test(style.overflowY);
      if (canScrollY && node.scrollHeight > node.clientHeight) return true;
      node = node.parentElement;
    }
    return false;
  };

  const indexFromScroll = () => {
    const viewportTop = window.scrollY + 1; // bias to current
    let closest = 0;
    let minDist = Infinity;
    sections.forEach((sec, i) => {
      const dist = Math.abs(sec.offsetTop - viewportTop);
      if (dist < minDist) { minDist = dist; closest = i; }
    });
    return closest;
  };

  const scrollToIndex = (idx) => {
    const next = clamp(idx, 0, sections.length - 1);
    if (next === currentIndex) return;
    animating = true;
    sections[next].scrollIntoView({ behavior: 'smooth', block: 'start' });
    currentIndex = next;
    setTimeout(() => { animating = false; }, 650);
  };

  const wheelHandler = (e) => {
    if (!isDesktop()) return; // allow native on mobile/tablet
    if (animating) { e.preventDefault(); return; }
    if (isEditable(e.target) || isInScrollable(e.target)) return;
    const delta = e.deltaY;
    if (Math.abs(delta) < 10) return;
    e.preventDefault();
    scrollToIndex(currentIndex + (delta > 0 ? 1 : -1));
  };

  const keyHandler = (e) => {
    if (!isDesktop()) return;
    if (animating) { e.preventDefault(); return; }
    if (isEditable(document.activeElement)) return;
    if (['ArrowDown', 'PageDown', ' '].includes(e.key)) {
      e.preventDefault();
      scrollToIndex(currentIndex + 1);
    } else if (['ArrowUp', 'PageUp'].includes(e.key)) {
      e.preventDefault();
      scrollToIndex(currentIndex - 1);
    } else if (e.key === 'Home') {
      e.preventDefault();
      scrollToIndex(0);
    } else if (e.key === 'End') {
      e.preventDefault();
      scrollToIndex(sections.length - 1);
    }
  };

  let touchStartY = 0;
  const touchStart = (e) => { touchStartY = e.changedTouches[0].clientY; };
  const touchEnd = (e) => {
    if (!isDesktop()) return; // keep native swipe on mobile
    if (animating) return;
    const delta = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(delta) < 40) return;
    scrollToIndex(currentIndex + (delta > 0 ? 1 : -1));
  };

  const onResize = () => { sections = getSections(); currentIndex = indexFromScroll(); };
  const onScroll = () => { if (!animating) currentIndex = indexFromScroll(); };

  window.addEventListener('resize', onResize, { passive: true });
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('wheel', wheelHandler, { passive: false });
  window.addEventListener('keydown', keyHandler, { passive: false });
  window.addEventListener('touchstart', touchStart, { passive: true });
  window.addEventListener('touchend', touchEnd, { passive: true });
})();
</script>
